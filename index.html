<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --focus-color: #e85d3a;
    --break-color: #3a8ee8;
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface2: #242428;
    --text: #f0f0f2;
    --muted: #7a7a85;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .mode-tabs {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }

  .mode-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .mode-tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  .timer-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 40px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .ring-wrap svg {
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear, stroke 0.4s;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .mode-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .session-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background 0.3s;
  }

  .dot.done { background: var(--focus-color); }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .btn:active { transform: scale(0.96); }
  .btn:hover { opacity: 0.85; }

  .btn-primary {
    background: var(--focus-color);
    color: #fff;
    font-size: 16px;
    padding: 14px 36px;
    min-width: 140px;
  }

  .btn-primary.break-mode { background: var(--break-color); }

  .btn-icon {
    background: var(--surface2);
    color: var(--text);
    width: 46px;
    height: 46px;
    border-radius: 10px;
    font-size: 18px;
  }

  .btn-icon.active { background: var(--focus-color); color: #fff; }

  .log-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .log-header {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 1px solid var(--surface2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-clear {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
  }
  .log-clear:hover { color: var(--text); }

  .log-list {
    max-height: 180px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-item {
    padding: 8px 18px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    color: var(--text);
    border-bottom: 1px solid var(--surface2);
  }

  .log-item:last-child { border-bottom: none; }
  .log-item span { color: var(--muted); font-size: 12px; }

  .log-empty {
    padding: 20px 18px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  .sound-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }

  svg.icon { width: 18px; height: 18px; fill: currentColor; }
</style>
</head>
<body>
<div class="app">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="focus">Focus</button>
    <button class="mode-tab" data-mode="break">Short break</button>
    <button class="mode-tab" data-mode="long">Long break</button>
  </div>

  <div class="timer-card">
    <div class="ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="98"/>
        <circle class="ring-progress" id="ring" cx="110" cy="110" r="98"
          stroke="#e85d3a"
          stroke-dasharray="615.75"
          stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="time-display" id="timeDisplay">15:00</div>
        <div class="mode-label" id="modeLabel">Focus</div>
      </div>
    </div>

    <div class="session-dots" id="sessionDots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="controls">
      <button class="btn btn-icon" id="resetBtn" title="Reset">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7a6 6 0 1 1-6 6H4a8 8 0 1 0 8-8z"/></svg>
      </button>
      <button class="btn btn-primary" id="startBtn">Start</button>
      <button class="btn btn-icon" id="soundBtn" title="Toggle sound">
        <svg class="icon" id="soundIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
    </div>
  </div>

  <div class="log-card" id="logCard">
    <div class="log-header">
      Today's sessions
      <button class="log-clear" id="clearLog">Clear</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty">No sessions yet — start your first focus block.</div>
    </div>
  </div>
</div>

<script>
const MODES = {
  focus: { label: 'Focus', secs: 15 * 60, color: '#e85d3a' },
  break: { label: 'Break', secs: 5 * 60, color: '#3a8ee8' },
  long:  { label: 'Long break', secs: 15 * 60, color: '#3ac8a8' }
};

const CIRCUMFERENCE = 2 * Math.PI * 98;

let currentMode = 'focus';
let totalSecs = MODES.focus.secs;
let remainingSecs = totalSecs;
let running = false;
let interval = null;
let soundOn = true;
let completedSessions = 0;
let sessionLog = [];

const ring = document.getElementById('ring');
const timeDisplay = document.getElementById('timeDisplay');
const modeLabel = document.getElementById('modeLabel');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const soundBtn = document.getElementById('soundBtn');
const soundIcon = document.getElementById('soundIcon');
const logList = document.getElementById('logList');
const logEmpty = document.getElementById('logEmpty');

const SOUND_ON_PATH = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
const SOUND_OFF_PATH = 'M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1 1.01L20 17.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

function updateRing() {
  const frac = remainingSecs / totalSecs;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
  ring.style.stroke = MODES[currentMode].color;
}

function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function render() {
  timeDisplay.textContent = formatTime(remainingSecs);
  modeLabel.textContent = MODES[currentMode].label;
  updateRing();
  startBtn.textContent = running ? 'Pause' : (remainingSecs < totalSecs ? 'Resume' : 'Start');
  startBtn.className = 'btn btn-primary' + (currentMode !== 'focus' ? ' break-mode' : '');
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'dot' + (i < completedSessions % 4 ? ' done' : '');
  }
}

function setMode(mode) {
  clearInterval(interval);
  running = false;
  currentMode = mode;
  totalSecs = MODES[mode].secs;
  remainingSecs = totalSecs;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  render();
}

function playBeep(type) {
  if (!soundOn) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const freqs = type === 'done' ? [880, 1100, 1320] : [660];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = f;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.35);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.4);
  });
}

function addLogEntry(mode) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const label = mode === 'focus' ? `Focus — ${MODES.focus.secs / 60} min` : `Break — ${MODES[mode].secs / 60} min`;
  sessionLog.unshift({ label, time });
  renderLog();
}

function renderLog() {
  if (sessionLog.length === 0) {
    logEmpty.style.display = '';
    logList.querySelectorAll('.log-item').forEach(el => el.remove());
    return;
  }
  logEmpty.style.display = 'none';
  logList.querySelectorAll('.log-item').forEach(el => el.remove());
  sessionLog.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'log-item';
    div.innerHTML = `${entry.label}<span>${entry.time}</span>`;
    logList.appendChild(div);
  });
}

function tick() {
  remainingSecs--;
  if (remainingSecs <= 0) {
    remainingSecs = 0;
    render();
    clearInterval(interval);
    running = false;
    playBeep('done');
    if (currentMode === 'focus') {
      completedSessions++;
      addLogEntry('focus');
      setTimeout(() => { if (confirm('Focus session done! Start a break?')) setMode('break'); }, 300);
    } else {
      addLogEntry(currentMode);
      setTimeout(() => { if (confirm('Break over! Ready to focus?')) setMode('focus'); }, 300);
    }
    return;
  }
  if (remainingSecs <= 3) playBeep('tick');
  render();
}

startBtn.addEventListener('click', () => {
  if (running) {
    clearInterval(interval);
    running = false;
  } else {
    running = true;
    interval = setInterval(tick, 1000);
  }
  render();
});

resetBtn.addEventListener('click', () => {
  clearInterval(interval);
  running = false;
  remainingSecs = totalSecs;
  render();
});

soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundIcon.querySelector('path').setAttribute('d', soundOn ? SOUND_ON_PATH : SOUND_OFF_PATH);
  soundBtn.classList.toggle('active', soundOn);
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => setMode(tab.dataset.mode));
});

document.getElementById('clearLog').addEventListener('click', () => {
  sessionLog = [];
  renderLog();
});

soundBtn.classList.add('active');
render();
</script>
</body>
</html>
